<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwindCss + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUi all themes -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- title & logo -->
    <title>English Janala</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- style sheet -->
    <link rel="stylesheet" href="./styles/style.css">

</head>

<body class="container mx-auto">
    <header>
        <!-- nav bar -->

        <div class="navbar bg-[#badeff49] h-[96px] shadow-sm lg:px-[76px] lg:py-[28px]">
            <div class="navbar-start space-x-1 font-semibold text-[20px]">
                <h1>English</h1>
                <img src="./assets/logo.png" alt="">
                <h1 class="bangla-font">জানালা</h1>
            </div>
            <div class="navbar-end">
                <div class="butons hidden lg:flex gap-4">
                    <a class="btn btn-outline btn-primary "><img src="./assets/fa-circle-question.png" alt="">FAQ</a>
                    <a class="btn btn-outline btn-primary "><img src="./assets/fa-book-open.png" alt=""> Learn</a>
                    <a class="btn btn-outline btn-primary "><img src="./assets/fa-arrow-right-from-bracket.png" alt="">
                        Logout</a>
                </div>

                <!-- small device drop down menu -->
                <div class="dropdown dropdown-end lg:hidden">
                    <div tabindex="0" role="button" class="btn btn-ghost ">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-25 p-2 shadow">
                        <li>
                            <a class="link link-primary link-hover"><img src="./assets/fa-circle-question.png"
                                    alt="">FAQ</a>
                        </li>
                        <li>
                            <a class="link link-primary link-hover"><img src="./assets/fa-book-open.png" alt="">
                                Learn</a>
                        </li>
                        <li>
                            <a class="link link-primary link-hover"><img src="./assets/fa-arrow-right-from-bracket.png"
                                    alt=""> Logout</a>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </header>

    
</body>

</html>
